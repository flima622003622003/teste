<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DET Study — Duolingo English Test Prep</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{background:#07091a;font-family:'Outfit',sans-serif;color:#e2e8f0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d1127}
::-webkit-scrollbar-thumb{background:#2d3a5e;border-radius:3px}
button,input,textarea{font-family:'Outfit',sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.fi{animation:fadeIn .35s ease both}
.bi{animation:bounceIn .4s ease both}
</style>
</head>
<body>
<div id="root"></div>
<script>
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

// ── CORES
var C = {
  bg:"#07091a", surface:"#0d1127", card:"#111729", border:"#1e2d4a",
  accent:"#22d3a0", green:"#4ade80", red:"#f87171", yellow:"#fbbf24",
  blue:"#60a5fa", purple:"#a78bfa", text:"#e2e8f0", muted:"#64748b"
};

// ── DADOS
var RS_ROUNDS = [
  [
    {w:"absent",r:1},{w:"abcent",r:0},{w:"benefit",r:1},{w:"benfit",r:0},
    {w:"concept",r:1},{w:"concapt",r:0},{w:"develop",r:1},{w:"develob",r:0},
    {w:"evidence",r:1},{w:"evidance",r:0},{w:"function",r:1},{w:"functon",r:0},
    {w:"general",r:1},{w:"generel",r:0},{w:"history",r:1},{w:"histary",r:0},
    {w:"impact",r:1},{w:"impcat",r:0},{w:"justify",r:1},{w:"justidy",r:0}
  ],
  [
    {w:"achieve",r:1},{w:"acheve",r:0},{w:"balance",r:1},{w:"balence",r:0},
    {w:"capable",r:1},{w:"capadle",r:0},{w:"discuss",r:1},{w:"discuse",r:0},
    {w:"efficient",r:1},{w:"eficient",r:0},{w:"global",r:1},{w:"globle",r:0},
    {w:"human",r:1},{w:"humun",r:0},{w:"involve",r:1},{w:"invove",r:0},
    {w:"knowledge",r:1},{w:"knowlege",r:0},{w:"language",r:1},{w:"lanquage",r:0}
  ],
  [
    {w:"maintain",r:1},{w:"maintan",r:0},{w:"network",r:1},{w:"netwerk",r:0},
    {w:"observe",r:1},{w:"obsirve",r:0},{w:"process",r:1},{w:"procces",r:0},
    {w:"quality",r:1},{w:"qualety",r:0},{w:"research",r:1},{w:"resarch",r:0},
    {w:"society",r:1},{w:"socyety",r:0},{w:"theory",r:1},{w:"therry",r:0},
    {w:"unique",r:1},{w:"uniqe",r:0},{w:"various",r:1},{w:"vareus",r:0}
  ]
];

var RC_DATA = [
  {answer:"concept",  missing:[1,3]},
  {answer:"develop",  missing:[1,3]},
  {answer:"evidence", missing:[0,2]},
  {answer:"function", missing:[1,6]},
  {answer:"history",  missing:[0,4]},
  {answer:"knowledge",missing:[2,4]},
  {answer:"maintain", missing:[1,5]},
  {answer:"observe",  missing:[0,2]},
  {answer:"research", missing:[1,4]},
  {answer:"society",  missing:[1,4]}
];

var VOC_DATA = [
  {q:"The scientist provided _____ to support her claim.",   word:"evidence",    opts:["evidence","opinion","feeling","question"],   def:"Proof that helps confirm something is true"},
  {q:"We need to _____ the data before drawing conclusions.",word:"analyze",     opts:["analyze","ignore","forget","damage"],        def:"Examine in detail to understand better"},
  {q:"The new policy will _____ thousands of people.",       word:"affect",      opts:["affect","delay","observe","create"],         def:"Have an influence on something or someone"},
  {q:"She had to _____ her position after new evidence.",    word:"revise",      opts:["revise","repeat","remove","reject"],         def:"Change something to improve or correct it"},
  {q:"The report _____ the main challenges in the sector.",  word:"highlights",  opts:["highlights","ignores","follows","replaces"], def:"Draws attention to the most important parts"},
  {q:"The results were not _____; they surprised everyone.", word:"anticipated", opts:["anticipated","forgotten","created","avoided"],def:"Expected or predicted in advance"},
  {q:"His argument was _____ by logic and clear examples.",  word:"supported",   opts:["supported","weakened","replaced","ignored"], def:"Backed up by reasoning or proof"},
  {q:"The two methods are _____; they cannot work together.",word:"incompatible",opts:["incompatible","identical","flexible","optional"],def:"Unable to exist or work together"}
];

var PROMPTS = [
  "Do you think technology has made people more or less connected to each other? Explain your view.",
  "Describe a challenge you faced and how you overcame it.",
  "Should universities focus more on practical skills or academic knowledge? Give reasons.",
  "What is the most important invention of the past 50 years and why?",
  "Is working from home better or worse than working in an office? Explain your perspective."
];

var TIPS = [
  {icon:"⚡",title:"Read & Select",tip:"Você tem ~15s. Clique RÁPIDO nas palavras que reconhece. Não pense demais — sua intuição é boa para palavras comuns.",col:C.blue},
  {icon:"🔤",title:"Read & Complete",tip:"Pense no som da palavra. Se parece estranho dizer em voz alta, provavelmente está errado. Foque em prefixos e sufixos.",col:C.purple},
  {icon:"✍️",title:"Writing",tip:"Use conectivos: Furthermore, However, In contrast. O avaliador valoriza variedade de vocabulário e estruturas complexas.",col:C.accent},
  {icon:"🗣️",title:"Fale com Clareza",tip:"No Read Aloud, fale com ritmo natural. Pausas nos lugares certos e pronúncia clara valem mais do que velocidade.",col:C.yellow},
  {icon:"🎯",title:"Meta: 60 pontos",tip:"60 pts no DET = nível B2. Foque em vocabulário acadêmico, gramática consistente e ideias bem organizadas na escrita.",col:C.green}
];

// ── UTILIDADES
function shuffle(arr){ return arr.slice().sort(function(){ return Math.random()-.5; }); }
function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function estScore(xp){
  if(xp<50)return 35; if(xp<100)return 42; if(xp<200)return 50;
  if(xp<350)return 57; if(xp<500)return 62; if(xp<700)return 68; return 75;
}

// ── ESTILOS BASE
var CARD = {background:C.card,borderRadius:16,padding:24,border:"1px solid "+C.border,marginBottom:16};
var ST   = {fontSize:12,fontWeight:700,color:C.accent,letterSpacing:1.5,marginBottom:14,textTransform:"uppercase"};

function Btn(props){
  var v = props.variant || "primary";
  var base = {
    padding:"12px 26px", borderRadius:12, border:"none", cursor:"pointer",
    fontWeight:700, fontSize:15, transition:"all .2s", outline:"none",
    background: v==="primary" ? C.accent : v==="ghost" ? "transparent" : C.border,
    color: v==="primary" ? "#07091a" : C.text
  };
  if(v==="ghost") base.border = "1px solid "+C.border;
  var style = Object.assign({}, base, props.style||{});
  return h("button", {style:style, onClick:props.onClick, disabled:props.disabled}, props.children);
}

function ProgBar(pct, col){
  col = col||C.accent;
  return h("div",{style:{height:8,borderRadius:4,background:C.border,overflow:"hidden",marginBottom:14}},
    h("div",{style:{height:"100%",width:pct+"%",background:col,borderRadius:4,transition:"width .5s"}}));
}

// ── DASHBOARD
function Dashboard(props){
  var score = estScore(props.xp);
  var pct   = Math.min((score/60)*100, 100);
  var exs = [
    {id:"read-select",  label:"Read & Select",    icon:"👁",  desc:"Identifique palavras reais em inglês",  xpR:20, time:"~1 min", col:C.blue},
    {id:"read-complete",label:"Read & Complete",  icon:"✏️", desc:"Preencha as letras que faltam",          xpR:25, time:"~2 min", col:C.purple},
    {id:"vocabulary",   label:"Vocabulary",       icon:"📖", desc:"Múltipla escolha — significados",        xpR:20, time:"~2 min", col:C.yellow},
    {id:"writing",      label:"Writing Practice", icon:"🖊", desc:"Escreva e receba avaliação da IA",       xpR:50, time:"~5 min", col:C.accent},
    {id:"tips",         label:"Estratégias DET",  icon:"💡", desc:"Técnicas para ir bem no teste",          xpR:0,  time:"~1 min", col:"#fb923c"}
  ];
  return h("div",{className:"fi"},
    // Score card
    h("div",{style:Object.assign({},CARD,{background:"linear-gradient(135deg,#111a35,#0d1f3a)",border:"1px solid rgba(34,211,160,.25)"})},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}},
        h("div",null,
          h("div",{style:ST},"Seu progresso DET"),
          h("div",{style:{fontSize:56,fontWeight:900,color:C.accent,lineHeight:1}},score),
          h("div",{style:{fontSize:13,color:C.muted,marginTop:4}},"estimado · Meta: ",
            h("span",{style:{color:C.yellow,fontWeight:700}},"60 pts"))
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:1}},"NÍVEL"),
          h("div",{style:{fontSize:28,fontWeight:800,color:score>=60?C.green:C.yellow}},
            score>=60?"B2":score>=45?"B1+":"B1"),
          h("div",{style:{fontSize:11,color:C.muted}},score>=60?"Meta atingida! 🎉":"Continue praticando")
        )
      ),
      h("div",{style:{marginBottom:8}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
          h("span",{style:{fontSize:12,color:C.muted}},"Progresso até a meta (60 pts)"),
          h("span",{style:{fontSize:12,color:C.accent,fontWeight:700}},Math.round(pct)+"%")
        ),
        ProgBar(pct)
      ),
      h("div",{style:{display:"flex",gap:20,flexWrap:"wrap"}},
        [["XP",props.xp+"xp"],["Pontos",score+"/160"],["Feitos",props.completed.length+" ex"]].map(function(item){
          return h("div",{key:item[0]},
            h("div",{style:{fontSize:11,color:C.muted,fontWeight:600}},item[0]),
            h("div",{style:{fontSize:18,fontWeight:800}},item[1]));
        })
      )
    ),
    h("div",{style:ST},"Exercícios de hoje"),
    exs.map(function(ex){
      var done = props.completed.indexOf(ex.id)>=0;
      return h("div",{key:ex.id,
        className:"fi",
        style:Object.assign({},CARD,{display:"flex",alignItems:"center",gap:16,
          cursor:done?"default":"pointer",opacity:done?.6:1,
          borderLeft:"3px solid "+(done?C.green:ex.col)}),
        onClick:function(){ if(!done) props.onStart(ex.id); },
        onMouseEnter:function(e){ if(!done) e.currentTarget.style.background="#161f38"; },
        onMouseLeave:function(e){ e.currentTarget.style.background=C.card; }
      },
        h("div",{style:{fontSize:26,width:44,height:44,display:"flex",alignItems:"center",
          justifyContent:"center",background:ex.col+"18",borderRadius:12,flexShrink:0}},ex.icon),
        h("div",{style:{flex:1}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("div",{style:{fontSize:16,fontWeight:700}},ex.label),
            done&&h("span",{style:{fontSize:11,background:C.green+"22",color:C.green,
              padding:"2px 8px",borderRadius:20,fontWeight:700}},"✓ Feito")
          ),
          h("div",{style:{fontSize:13,color:C.muted,marginTop:2}},ex.desc)
        ),
        h("div",{style:{textAlign:"right"}},
          ex.xpR>0&&h("div",{style:{fontSize:14,fontWeight:700,color:ex.col}},"+"+ex.xpR+" xp"),
          h("div",{style:{fontSize:11,color:C.muted}},ex.time)
        )
      );
    }),
    h("div",{style:Object.assign({},CARD,{background:"#0d1a2e",border:"1px solid #1e3a5f"})},
      h("div",{style:ST},"💡 Dica rápida"),
      h("div",{style:{fontSize:14,lineHeight:1.7}},
        "No Read & Select, procure sufixos como ",
        h("code",{style:{background:"#1e3a5f",padding:"1px 6px",borderRadius:4,color:C.blue}},"-tion"),
        ", ",h("code",{style:{background:"#1e3a5f",padding:"1px 6px",borderRadius:4,color:C.blue}},"-ment"),
        ", ",h("code",{style:{background:"#1e3a5f",padding:"1px 6px",borderRadius:4,color:C.blue}},"-ence"),
        ". Palavras falsas têm combinações como ",
        h("em",{style:{color:C.red}},"-dp-")," ou ",h("em",{style:{color:C.red}},"-tb-"),"."
      )
    )
  );
}

// ── READ & SELECT
function ReadSelect(props){
  var initWords = React.useMemo(function(){ return shuffle(rnd(RS_ROUNDS)); },[]);
  var _s1 = useState(initWords);   var words = _s1[0];
  var _s2 = useState({});          var sel = _s2[0];  var setSel = _s2[1];
  var _s3 = useState(false);       var done = _s3[0]; var setDone = _s3[1];
  var _s4 = useState(47);          var time = _s4[0]; var setTime = _s4[1];
  var timerRef = useRef(null);

  useEffect(function(){
    timerRef.current = setInterval(function(){
      setTime(function(t){
        if(t<=1){ clearInterval(timerRef.current); setDone(true); return 0; }
        return t-1;
      });
    },1000);
    return function(){ clearInterval(timerRef.current); };
  },[]);

  function toggle(w){
    if(done) return;
    setSel(function(s){ var n=Object.assign({},s); n[w]=!n[w]; return n; });
  }
  function submit(){ clearInterval(timerRef.current); setDone(true); }

  var correct = words.filter(function(x){ return x.r&&sel[x.w]; }).length;
  var total   = words.filter(function(x){ return x.r; }).length;
  var wrong   = words.filter(function(x){ return !x.r&&sel[x.w]; }).length;
  var score   = Math.max(0, correct-wrong);
  var ok      = score >= total*.7;

  return h("div",{className:"fi"},
    h("div",{style:CARD},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h("div",null,
          h("div",{style:ST},"👁 Read & Select"),
          h("div",{style:{fontSize:14,color:C.muted}},
            "Clique em todas as ",h("strong",null,"palavras reais")," em inglês")
        ),
        !done&&h("div",{style:{padding:"8px 14px",borderRadius:10,fontWeight:700,fontSize:20,
          background:time<10?"#dc262622":"#1e2d4a",color:time<10?C.red:C.text,
          fontFamily:"monospace",border:"1px solid "+(time<10?C.red:C.border)}},time+"s")
      ),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:10,marginBottom:24}},
        words.map(function(item,i){
          var s=sel[item.w];
          var bg=s?C.accent+"22":C.surface, bo=s?C.accent:C.border, co=s?C.accent:C.text;
          if(done){
            if(item.r&&s){bg="#16a34a22";bo=C.green;co=C.green;}
            else if(item.r&&!s){bg="#dc262622";bo=C.red;co=C.red;}
            else if(!item.r&&s){bg="#dc262622";bo=C.red;co=C.red;}
            else{bg=C.surface;bo=C.border;co=C.muted;}
          }
          return h("button",{key:item.w+i,onClick:function(){toggle(item.w);},
            style:{padding:"10px 18px",borderRadius:10,border:"1.5px solid "+bo,
              background:bg,color:co,fontWeight:600,fontSize:15,cursor:"pointer",
              transition:"all .15s"}},item.w);
        })
      ),
      !done
        ? h(Btn,{onClick:submit},"Verificar →")
        : h("div",{className:"bi"},
            h("div",{style:Object.assign({},CARD,{background:ok?"#16a34a22":"#dc262622",
              border:"1px solid "+(ok?C.green:C.red),textAlign:"center",marginBottom:16})},
              h("div",{style:{fontSize:32,marginBottom:8}},ok?"🎯":"📚"),
              h("div",{style:{fontSize:20,fontWeight:800,color:ok?C.green:C.red}},score+"/"+total+" corretas"),
              h("div",{style:{fontSize:13,color:C.muted,marginTop:4}},
                correct+" acertos · "+wrong+" erros · "+(total-correct)+" perdidas")
            ),
            h(Btn,{onClick:function(){props.onDone(20);}},"+20 XP · Continuar →")
          )
    )
  );
}

// ── READ & COMPLETE
function ReadComplete(props){
  var _q = React.useMemo(function(){ return shuffle(RC_DATA).slice(0,6); },[]);
  var _s1 = useState(_q);         var qs = _s1[0];
  var _s2 = useState(0);          var idx = _s2[0];    var setIdx = _s2[1];
  var _s3 = useState("");         var val = _s3[0];    var setVal = _s3[1];
  var _s4 = useState([]);         var results = _s4[0]; var setResults = _s4[1];
  var _s5 = useState(false);      var checked = _s5[0]; var setChecked = _s5[1];

  var finished = idx >= qs.length;
  var q = qs[idx] || {answer:"",missing:[]};

  function check(){
    if(!val.trim()) return;
    var ok = val.trim().toLowerCase() === q.answer.toLowerCase();
    setResults(function(r){ return r.concat([{answer:q.answer,user:val,ok:ok}]); });
    setChecked(true);
  }
  function next(){ setVal(""); setChecked(false); setIdx(function(i){return i+1;}); }

  if(finished){
    var okCount = results.filter(function(r){return r.ok;}).length;
    return h("div",{className:"fi",style:CARD},
      h("div",{style:ST},"✏️ Resultado"),
      h("div",{style:{textAlign:"center",marginBottom:24}},
        h("div",{style:{fontSize:48,marginBottom:8}},okCount>=4?"✨":"📖"),
        h("div",{style:{fontSize:28,fontWeight:800,color:C.accent}},okCount+"/"+qs.length),
        h("div",{style:{fontSize:14,color:C.muted}},"palavras corretas")
      ),
      results.map(function(r,i){
        return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",
          padding:"10px 14px",borderRadius:10,marginBottom:8,
          background:r.ok?"#16a34a18":"#dc262618",
          border:"1px solid "+(r.ok?"#16a34a33":"#dc262633")}},
          h("span",{style:{color:C.muted}},r.user),
          h("span",{style:{fontWeight:700,color:r.ok?C.green:C.red}},r.answer));
      }),
      h(Btn,{style:{marginTop:16},onClick:function(){props.onDone(25);}},"+25 XP · Continuar →")
    );
  }

  var chars = q.answer.split("").map(function(ch,i){
    return {ch:ch, blank: q.missing.indexOf(i)>=0};
  });
  var lastOk = results.length>0 ? results[results.length-1].ok : null;

  return h("div",{className:"fi"},
    h("div",{style:CARD},
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
        h("div",{style:ST},"✏️ Read & Complete"),
        h("span",{style:{fontSize:13,color:C.muted}},idx+1+"/"+qs.length)
      ),
      ProgBar((idx/qs.length)*100),
      h("div",{style:{textAlign:"center",padding:"28px 0"}},
        h("div",{style:{fontSize:13,color:C.muted,marginBottom:14}},"Complete a palavra:"),
        h("div",{style:{fontSize:38,letterSpacing:8,fontFamily:"monospace",marginBottom:8}},
          chars.map(function(c,i){
            return h("span",{key:i,style:{color:c.blank?C.accent:C.text,
              borderBottom:c.blank?"3px solid "+C.accent:"none",paddingBottom:c.blank?2:0}},
              c.blank?"_":c.ch);
          })
        ),
        h("div",{style:{fontSize:13,color:C.muted}},"("+q.answer.length+" letras)")
      ),
      h("input",{
        value:val,
        onChange:function(e){setVal(e.target.value);},
        onKeyDown:function(e){if(e.key==="Enter"&&!checked) check();},
        disabled:checked,
        placeholder:"Digite a palavra completa...",
        style:{width:"100%",padding:"14px 18px",borderRadius:12,background:C.surface,
          border:"1.5px solid "+(checked?(lastOk?C.green:C.red):C.border),
          color:C.text,fontSize:18,outline:"none",letterSpacing:3,
          textAlign:"center",marginBottom:12}
      }),
      checked && h("div",{style:{padding:"12px",borderRadius:10,textAlign:"center",marginBottom:12,
        background:lastOk?"#16a34a22":"#dc262622",
        border:"1px solid "+(lastOk?C.green:C.red)}},
        lastOk
          ? h("span",{style:{color:C.green,fontWeight:700}},"✓ Correto!")
          : h("span",{style:{color:C.red,fontWeight:700}},"✗ Resposta: ",
              h("strong",{style:{fontFamily:"monospace"}},q.answer))
      ),
      !checked
        ? h(Btn,{onClick:check},"Verificar")
        : h(Btn,{onClick:next}, idx===qs.length-1?"Ver resultado →":"Próxima →")
    )
  );
}

// ── VOCABULARY
function Vocabulary(props){
  var _q = React.useMemo(function(){ return shuffle(VOC_DATA).slice(0,5); },[]);
  var _s1 = useState(_q);       var qs = _s1[0];
  var _s2 = useState(0);        var idx = _s2[0];    var setIdx = _s2[1];
  var _s3 = useState(null);     var chosen = _s3[0]; var setChosen = _s3[1];
  var _s4 = useState([]);       var results = _s4[0]; var setResults = _s4[1];
  var finished = idx >= qs.length;
  var q = qs[idx] || {q:"",word:"",opts:[],def:""};

  function pick(opt){
    if(chosen) return;
    setChosen(opt);
    setResults(function(r){ return r.concat([{ok:opt===q.word}]); });
  }
  function next(){ setChosen(null); setIdx(function(i){return i+1;}); }

  if(finished){
    var okCount = results.filter(function(r){return r.ok;}).length;
    return h("div",{className:"fi",style:CARD},
      h("div",{style:ST},"📖 Resultado — Vocabulário"),
      h("div",{style:{textAlign:"center",margin:"24px 0"}},
        h("div",{style:{fontSize:48}},okCount>=4?"🌟":"📚"),
        h("div",{style:{fontSize:32,fontWeight:900,color:C.accent,marginTop:8}},okCount+"/"+qs.length),
        h("div",{style:{fontSize:14,color:C.muted}},"questões corretas")
      ),
      h(Btn,{onClick:function(){props.onDone(20);}},"+20 XP · Continuar →")
    );
  }

  return h("div",{className:"fi"},
    h("div",{style:CARD},
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
        h("div",{style:ST},"📖 Vocabulary"),
        h("span",{style:{fontSize:13,color:C.muted}},idx+1+"/"+qs.length)
      ),
      ProgBar((idx/qs.length)*100, C.yellow),
      h("div",{style:{padding:"20px 0 8px"}},
        h("div",{style:{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:1,marginBottom:10}},
          "COMPLETE A FRASE:"),
        h("div",{style:{fontSize:18,fontWeight:600,lineHeight:1.7}},q.q),
        chosen && h("div",{style:{fontSize:13,color:C.muted,fontStyle:"italic",marginTop:10,
          padding:"10px 14px",background:C.surface,borderRadius:8}},q.def)
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:16}},
        q.opts.map(function(opt,i){
          var bg=C.surface, bo=C.border, co=C.text;
          if(chosen){
            if(opt===q.word){bg="#16a34a22";bo=C.green;co=C.green;}
            else if(opt===chosen){bg="#dc262622";bo=C.red;co=C.red;}
            else co=C.muted;
          }
          return h("button",{key:opt,onClick:function(){pick(opt);},
            style:{padding:"14px 16px",borderRadius:12,border:"1.5px solid "+bo,
              background:bg,color:co,fontWeight:600,fontSize:15,textAlign:"left",
              cursor:chosen?"default":"pointer",transition:"all .2s"}},
            h("span",{style:{color:C.muted,fontSize:12,marginRight:8}},
              ["A","B","C","D"][i]+"."),
            opt);
        })
      ),
      chosen && h(Btn,{style:{marginTop:16},onClick:next},
        idx===qs.length-1?"Ver resultado →":"Próxima →")
    )
  );
}

// ── WRITING
function Writing(props){
  var _s1 = useState(rnd(PROMPTS));  var prompt = _s1[0];
  var _s2 = useState("");            var text = _s2[0];    var setText = _s2[1];
  var _s3 = useState(false);         var loading = _s3[0]; var setLoading = _s3[1];
  var _s4 = useState(null);          var feedback = _s4[0]; var setFeedback = _s4[1];
  var _s5 = useState(localStorage.getItem("det_key")||""); var apiKey = _s5[0]; var setApiKey = _s5[1];
  var _s6 = useState(!localStorage.getItem("det_key"));    var showKey = _s6[0]; var setShowKey = _s6[1];
  var wc = text.trim().split(/\s+/).filter(Boolean).length;

  function saveKey(){ localStorage.setItem("det_key",apiKey); setShowKey(false); }

  function getFeedback(){
    if(wc<30||!apiKey) return;
    setLoading(true);
    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:900,
        system:'Você é avaliador do DET (Duolingo English Test). Aluno brasileiro, meta 60 pts. Retorne SOMENTE JSON válido sem markdown: {"score":1-5,"level":"B1","summary":"2 frases em português","strengths":["s1","s2"],"improvements":["i1","i2","i3"],"corrected":"frase melhorada"}',
        messages:[{role:"user",content:'Prompt: "'+prompt+'"\nResposta: "'+text+'"'}]
      })
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var raw=(d.content||[]).find(function(b){return b.type==="text";});
      raw = raw ? raw.text : "{}";
      raw = raw.replace(/```json|```/g,"").trim();
      setFeedback(JSON.parse(raw));
      setLoading(false);
    })
    .catch(function(){
      setFeedback({score:2,level:"B1",summary:"Erro ao conectar. Verifique sua API key.",strengths:[],improvements:[],corrected:""});
      setLoading(false);
    });
  }

  return h("div",{className:"fi"},
    h("div",{style:CARD},
      h("div",{style:ST},"🖊 Writing Practice"),
      showKey && h("div",{style:Object.assign({},CARD,{background:"#1a1f2e",border:"1px solid "+C.yellow+"33",marginBottom:16})},
        h("div",{style:{fontSize:13,color:C.yellow,fontWeight:700,marginBottom:6}},"🔑 API Key Anthropic (para feedback IA)"),
        h("div",{style:{fontSize:12,color:C.muted,marginBottom:10}},
          "Obtenha em ",
          h("a",{href:"https://console.anthropic.com",target:"_blank",
            style:{color:C.blue}},"console.anthropic.com"),
          " → API Keys"),
        h("div",{style:{display:"flex",gap:8}},
          h("input",{value:apiKey,onChange:function(e){setApiKey(e.target.value);},
            placeholder:"sk-ant-...",type:"password",
            style:{flex:1,padding:"10px 14px",borderRadius:10,background:C.surface,
              border:"1px solid "+C.border,color:C.text,fontSize:13,outline:"none"}}),
          h(Btn,{style:{padding:"10px 16px",fontSize:13},onClick:saveKey},"Salvar")
        ),
        h(Btn,{variant:"ghost",style:{marginTop:8,padding:"6px 14px",fontSize:12},
          onClick:function(){setShowKey(false);}},"Pular por agora")
      ),
      h("div",{style:Object.assign({},CARD,{background:"#0d1a2e",border:"1px solid #1e3a5f",marginBottom:16})},
        h("div",{style:{fontSize:11,color:C.blue,fontWeight:700,letterSpacing:1,marginBottom:8}},"PROMPT"),
        h("div",{style:{fontSize:16,lineHeight:1.7,fontStyle:"italic"}},'"'+prompt+'"')
      ),
      !feedback
        ? h("div",null,
            h("textarea",{value:text,onChange:function(e){setText(e.target.value);},
              placeholder:"Escreva sua resposta em inglês aqui... (mínimo 50 palavras)",
              style:{width:"100%",minHeight:160,padding:"14px 16px",background:C.surface,
                border:"1.5px solid "+C.border,borderRadius:12,color:C.text,fontSize:15,
                lineHeight:1.7,outline:"none",resize:"vertical",marginBottom:8}}),
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("div",{style:{display:"flex",gap:12,alignItems:"center"}},
                h("span",{style:{fontSize:12,color:wc>=50?C.green:C.muted}},
                  wc+" palavras"+(wc>=50?" ✓":"")),
                !showKey&&h("button",{onClick:function(){setShowKey(true);},
                  style:{background:"none",border:"1px solid "+C.border,color:C.muted,
                    padding:"4px 10px",borderRadius:8,fontSize:11,cursor:"pointer"}},"🔑 API Key")
              ),
              h(Btn,{onClick:getFeedback,
                style:{opacity:wc<30||loading?.5:1,pointerEvents:wc<30||loading?"none":"auto"}},
                loading?"Analisando...":"Avaliar com IA →")
            )
          )
        : h("div",{className:"fi"},
            h("div",{style:Object.assign({},CARD,{background:"linear-gradient(135deg,#0d1a2e,#111a35)",
              border:"1px solid rgba(34,211,160,.2)",textAlign:"center",marginBottom:16})},
              h("div",{style:{fontSize:36,marginBottom:8}},["","😕","🙂","👍","🌟","🚀"][feedback.score||3]),
              h("div",{style:{fontSize:28,fontWeight:900,color:C.accent}},feedback.level),
              h("div",{style:{display:"flex",justifyContent:"center",gap:4,margin:"6px 0"}},
                [1,2,3,4,5].map(function(n){
                  return h("span",{key:n,style:{fontSize:20,opacity:n<=(feedback.score||3)?1:.2}},"★");
                })
              ),
              h("div",{style:{fontSize:14,lineHeight:1.6,maxWidth:480,margin:"0 auto"}},feedback.summary)
            ),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}},
              h("div",{style:Object.assign({},CARD,{background:"#16a34a18",border:"1px solid #16a34a33"})},
                h("div",{style:{fontSize:11,color:C.green,fontWeight:700,letterSpacing:1,marginBottom:10}},"✓ PONTOS FORTES"),
                (feedback.strengths||[]).map(function(s,i){
                  return h("div",{key:i,style:{fontSize:13,marginBottom:6}},"• "+s);
                })
              ),
              h("div",{style:Object.assign({},CARD,{background:"#dc262618",border:"1px solid #dc262633"})},
                h("div",{style:{fontSize:11,color:C.red,fontWeight:700,letterSpacing:1,marginBottom:10}},"↑ MELHORAR"),
                (feedback.improvements||[]).map(function(s,i){
                  return h("div",{key:i,style:{fontSize:13,marginBottom:6}},"• "+s);
                })
              )
            ),
            feedback.corrected && h("div",{style:Object.assign({},CARD,{background:"#1a1f2e",marginBottom:16})},
              h("div",{style:{fontSize:11,color:C.purple,fontWeight:700,letterSpacing:1,marginBottom:8}},"✏️ FRASE MELHORADA"),
              h("div",{style:{fontSize:14,fontStyle:"italic",lineHeight:1.6}},'"'+feedback.corrected+'"')
            ),
            h("div",{style:{display:"flex",gap:12}},
              h(Btn,{variant:"ghost",onClick:function(){setText("");setFeedback(null);}},"Tentar novamente"),
              h(Btn,{onClick:function(){props.onDone(50);}},"+50 XP · Concluir →")
            )
          )
    )
  );
}

      h("div",{style:{fontSize:14,color:C.muted,lineHeight:1.7}},

// ── APP PRINCIPAL
function App(){
  var _s1 = useState("dash");  var screen = _s1[0]; var setScreen = _s1[1];
  var _s2 = useState(null);    var ex = _s2[0];     var setEx = _s2[1];
  var _s3 = useState(0);       var xp = _s3[0];     var setXP = _s3[1];
  var _s4 = useState([]);      var done = _s4[0];   var setDone = _s4[1];

  function start(id){ setEx(id); setScreen("ex"); }
  function finish(gained){
    setXP(function(x){return x+gained;});
    setDone(function(d){return d.concat([ex]);});
    setScreen("dash"); setEx(null);
  }

  var names = {
    "read-select":"👁 Read & Select","read-complete":"✏️ Read & Complete",
    "vocabulary":"📖 Vocabulary","writing":"🖊 Writing Practice","tips":"💡 Estratégias"
  };

  var score = estScore(xp);

  return h("div",{style:{minHeight:"100vh",background:C.bg,paddingBottom:80}},
    // Header
    h("div",{style:{background:"linear-gradient(135deg,#0d1127,#111a35)",
      borderBottom:"1px solid "+C.border,padding:"14px 24px",display:"flex",
      alignItems:"center",justifyContent:"space-between",
      position:"sticky",top:0,zIndex:100}},
      h("div",null,
        h("div",{style:{fontSize:20,fontWeight:900,color:C.accent,letterSpacing:-.5}},"DET·Study"),
        h("div",{style:{fontSize:10,color:C.muted,fontWeight:600,letterSpacing:1}},
          "DUOLINGO ENGLISH TEST PREP")
      ),
      h("div",{style:{display:"flex",gap:10}},
        [[xp+"xp","XP",C.accent],[score,"DET",C.yellow],[done.length,"FEITOS",C.blue]].map(function(item){
          return h("div",{key:item[1],style:{padding:"4px 12px",borderRadius:10,textAlign:"center",
            background:item[2]+"10",border:"1px solid "+item[2]+"25"}},
            h("div",{style:{fontSize:18,fontWeight:800,color:item[2],lineHeight:1}},item[0]),
            h("div",{style:{fontSize:10,color:C.muted,fontWeight:600}},item[1]));
        })
      )
    ),
    // Barra voltar
    screen==="ex" && h("div",{style:{padding:"10px 24px",background:C.surface,
      borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:12}},
      h(Btn,{variant:"ghost",style:{padding:"6px 12px",fontSize:13},
        onClick:function(){setScreen("dash");setEx(null);}},
        "← Voltar"),
      h("span",{style:{fontSize:14,color:C.muted}},names[ex]||"")
    ),
    // Conteúdo
    h("div",{style:{maxWidth:780,margin:"0 auto",padding:"24px 16px"}},
      screen==="dash"             && h(Dashboard,   {xp:xp,onStart:start,completed:done}),
      screen==="ex"&&ex==="read-select"   && h(ReadSelect,  {onDone:finish}),
      screen==="ex"&&ex==="read-complete" && h(ReadComplete, {onDone:finish}),
      screen==="ex"&&ex==="vocabulary"    && h(Vocabulary,   {onDone:finish}),
      screen==="ex"&&ex==="writing"       && h(Writing,      {onDone:finish}),
      screen==="ex"&&ex==="tips"          && h(Tips,         {onDone:finish})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
